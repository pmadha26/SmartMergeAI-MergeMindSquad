<ng-container>
     
    <ibm-clickable-tile [route]="[routeUrlMap['return-search']]" [ngClass]="{ 'cds--tile--is-selected': 'return-search' === environment.getRouteName() }">
		{{ 'ROUTE_NAMES.LABEL_RETURN_SEARCH' | translate}}
    </ibm-clickable-tile>
     
    <ibm-clickable-tile [route]="[routeUrlMap['return-search-result']]" [ngClass]="{ 'cds--tile--is-selected': 'return-search-result' === environment.getRouteName() }">
		{{ 'ROUTE_NAMES.LABEL_RETURN_SEARCH_RESULT' | translate}}
    </ibm-clickable-tile>
     
    <ibm-clickable-tile [route]="[routeUrlMap['return-details']]" [ngClass]="{ 'cds--tile--is-selected': 'return-details' === environment.getRouteName() }">
		{{ 'ROUTE_NAMES.LABEL_RETURN_DETAILS' | translate}}
    </ibm-clickable-tile>
    
</ng-container>
