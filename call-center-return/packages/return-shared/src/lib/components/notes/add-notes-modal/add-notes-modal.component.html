<ibm-modal size="md" [open]="open">
  <ibm-modal-header (closeSelect)="closeModal()">
    {{ 'SHARED.NOTES.LABEL_ADD_NOTE' | translate }}
  </ibm-modal-header>

  <ng-container *ngIf="!isModalInitialized">
    <div class="loading">
      <buc-loading [isActive]="!isModalInitialized"></buc-loading>
    </div>
  </ng-container>
  <ng-template bucExtension [componentName]="componentId" [placement]="'top'" [id]="EXTENSION.TOP" [parent]="this">
  </ng-template>

  <section class="cds--modal-content" *ngIf="isModalInitialized">
    <div class="width--100p padding-right--1rem">
      <call-center-notes-form [returnReasons]="noteTypelist" [contactTypeList]="contactTypeList"
        (changeNote)="changeNote($event)" [toggleValidation]="toggleValidation" [note]="modalData.note" [allowExchangeNotes]="allowExchangeNotes" [categoryType]="categoryType" (setCategoryType)="setCategoryType($event)" [categoryVisible]="modalData.categoryVisible">
      </call-center-notes-form>
    </div>
  </section>

  <ng-template bucExtension [componentName]="componentId" [placement]="'bottom'" [id]="EXTENSION.BOTTOM" [parent]="this">
  </ng-template>

  <ibm-modal-footer *ngIf="isModalInitialized">
    <button [attr.tid]="'add-note-cancel'" class="cds--btn cds--btn--secondary" modal-primary-focus
      (click)="closeModal()">
      {{ 'SHARED.GENERAL.LABEL_CANCEL' | translate }}
    </button>
    <button [attr.tid]="'add-note-save'" class="cds--btn cds--btn--primary" (click)="addNote()" [disabled]="disableSave">
      {{ 'SHARED.GENERAL.LABEL_SAVE' | translate }}
    </button>
  </ibm-modal-footer>
</ibm-modal>
