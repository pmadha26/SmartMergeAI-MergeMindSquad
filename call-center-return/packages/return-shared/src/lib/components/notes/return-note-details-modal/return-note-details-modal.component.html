<ng-template bucExtension [componentName]="componentId" [placement]="'top'" [id]="EXTENSION.TOP" [parent]="this">
</ng-template>

<ibm-modal size="md" [open]="open">
  <ibm-modal-header (closeSelect)="closeModal()">
    {{ note.reasonText}}
  </ibm-modal-header>

  <call-center-return-notes-card
    [note]="note"
    [showControls]="true"
    [showNoteReasonText]="false"
    tagPosition="top"
    [searchKey]="searchKey"
    (editNote)="modalData.initiateEdit($event)"
    (deleteNote)="modalData.initiateDelete($event)"
    [isModal]="isModal"
    [categoryType]="categoryType"
    [isHistoryOrder]="isHistoryOrder">
  </call-center-return-notes-card>
</ibm-modal>

<ng-template bucExtension [componentName]="componentId" [placement]="'bottom'" [id]="EXTENSION.BOTTOM" [parent]="this">
</ng-template>
